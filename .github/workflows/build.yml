name: Build and Push Deno Bot
on:
  push:
    branches: ["main"]
    paths-ignore: ["k8s/**", "clusters/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Важно: название должно совпадать с тем, что ты написал в deploy.yaml
          tags: ghcr.io/${{ github.repository }}:latest
          # Кэширование ускорит будущие сборки
          cache-from: type=gha
          cache-to: type=gha,mode=max
